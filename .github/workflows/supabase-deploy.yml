name: Deploy Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Migrations
        run: |
          # 1. 비밀번호 URL 인코딩
          DB_PASSWORD=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''${{ secrets.SUPABASE_DB_PASSWORD }}'''))")
          
          # 2. 포트를 6543으로 변경하여 IPv4 연결 유도
          # sslmode=require를 추가하여 보안 연결을 강제합니다.
          DB_URL="postgresql://postgres:${DB_PASSWORD}@db.${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co:6543/postgres?sslmode=require"
          
          echo "Connecting to Supabase DB via Port 6543 (Connection Pooler)..."
          
          # 3. 마이그레이션 푸시
          supabase db push --db-url "$DB_URL"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
