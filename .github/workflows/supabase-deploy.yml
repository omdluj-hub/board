name: Deploy Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Migrations
        run: |
          if [ -z "${{ secrets.SUPABASE_PROJECT_ID }}" ]; then echo "Error: SUPABASE_PROJECT_ID is missing"; exit 1; fi
          if [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ]; then echo "Error: SUPABASE_DB_PASSWORD is missing"; exit 1; fi
          
          # Print the first 3 characters of Project ID to confirm it's being read
          PROJECT_ID="${{ secrets.SUPABASE_PROJECT_ID }}"
          echo "Connecting to project starting with: ${PROJECT_ID:0:3}..."
          
          # Use --debug to see EXACTLY why it fails
          supabase db push --debug --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}" --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
