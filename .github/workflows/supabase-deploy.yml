name: Deploy Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Migrations
        run: |
          if [ -z "${{ secrets.SUPABASE_PROJECT_ID }}" ]; then echo "Error: SUPABASE_PROJECT_ID is missing"; exit 1; fi
          if [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ]; then echo "Error: SUPABASE_DB_PASSWORD is missing"; exit 1; fi
          
          supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
