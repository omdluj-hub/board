name: Deploy Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Migrations
        run: |
          # 1. Project ID 공백 제거 및 환경변수 설정
          RAW_ID="${{ secrets.SUPABASE_PROJECT_ID }}"
          PROJECT_ID=$(echo $RAW_ID | xargs)
          
          # 2. 지역 정보 가져오기
          PROJECT_INFO=$(curl -s -X GET "https://api.supabase.com/v1/projects/${PROJECT_ID}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}")
          REGION=$(echo $PROJECT_INFO | jq -r '.region')
          
          if [ -z "$REGION" ] || [ "$REGION" == "null" ]; then
            echo "Warning: Region not found via API, trying default ap-northeast-2"
            REGION="ap-northeast-2"
          fi
          
          DB_PASSWORD=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''${{ secrets.SUPABASE_DB_PASSWORD }}'''))")
          
          # 3. AWS와 GCP 풀러 주소 후보군 생성
          AWS_HOST="aws-0-${REGION}.pooler.supabase.com"
          GCP_HOST="gcp-0-${REGION}.pooler.supabase.com"
          
          echo "Trying AWS Pooler: $AWS_HOST"
          # AWS 시도
          DB_URL="postgresql://postgres.${PROJECT_ID}:${DB_PASSWORD}@${AWS_HOST}:6543/postgres?sslmode=require"
          if supabase db push --db-url "$DB_URL"; then
            echo "Successfully deployed via AWS Pooler"
            exit 0
          fi
          
          echo "AWS Pooler failed, trying GCP Pooler: $GCP_HOST"
          # GCP 시도
          DB_URL="postgresql://postgres.${PROJECT_ID}:${DB_PASSWORD}@${GCP_HOST}:6543/postgres?sslmode=require"
          if supabase db push --db-url "$DB_URL"; then
            echo "Successfully deployed via GCP Pooler"
            exit 0
          fi
          
          echo "Both AWS and GCP poolers failed. Please check if PROJECT_ID is correct."
          exit 1
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
