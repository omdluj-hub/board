name: Deploy Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Migrations
        run: |
          # 1. Project ID 정제 (공백 제거 및 소문자화)
          RAW_ID="${{ secrets.SUPABASE_PROJECT_ID }}"
          PROJECT_ID=$(echo "$RAW_ID" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
          echo "Connecting to Project ID: ${PROJECT_ID:0:4}..."
          
          # 2. Supabase API를 통해 정확한 지역(Region) 및 정보 확인
          # API 응답이 실패할 경우를 대비해 상세 로그를 남깁니다.
          PROJECT_INFO=$(curl -s -X GET "https://api.supabase.com/v1/projects/${PROJECT_ID}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}")
          
          if [[ "$PROJECT_INFO" == *"error"* ]] || [[ "$PROJECT_INFO" == "null" ]]; then
            echo "Error: Could not fetch project info from Supabase API."
            echo "Response: $PROJECT_INFO"
            echo "Please check if SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_ID are correct."
            exit 1
          fi
          
          REGION=$(echo $PROJECT_INFO | jq -r '.region')
          echo "Detected Region: $REGION"
          
          # 3. 비밀번호 인코딩
          DB_PASSWORD=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''${{ secrets.SUPABASE_DB_PASSWORD }}'''))")
          
          # 4. 다양한 주소로 연결 시도 (IPv4 전용 풀러)
          # 주소 형식이 aws-0 또는 gcp-0일 수 있으므로 둘 다 시도합니다.
          SUCCESS=false
          for CLOUD in "aws-0" "gcp-0"; do
            DB_HOST="${CLOUD}-${REGION}.pooler.supabase.com"
            echo "Trying Connection to $DB_HOST..."
            
            # 사용자 아이디 형식: postgres.[ProjectID]
            DB_URL="postgresql://postgres.${PROJECT_ID}:${DB_PASSWORD}@${DB_HOST}:6543/postgres?sslmode=require"
            
            if supabase db push --db-url "$DB_URL"; then
              echo "✅ Successfully deployed migrations via $DB_HOST"
              SUCCESS=true
              break
            fi
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "❌ All connection attempts failed."
            echo "Please ensure 'Connection Pooling' is enabled in your Supabase Dashboard (Database -> Connection Pooling)."
            exit 1
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
