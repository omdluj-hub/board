name: Deploy Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Migrations
        run: |
          # 1. Supabase API를 통해 프로젝트 정보(지역) 가져오기
          # SUPABASE_ACCESS_TOKEN을 사용하여 프로젝트의 상세 정보를 조회합니다.
          PROJECT_INFO=$(curl -s -X GET "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_ID }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}")
          
          REGION=$(echo $PROJECT_INFO | jq -r '.region')
          
          if [ -z "$REGION" ] || [ "$REGION" == "null" ]; then
            echo "Failed to get project region. API Response: $PROJECT_INFO"
            # 지역을 못 가져올 경우를 대비해 기본값(서울)을 시도해봅니다.
            REGION="ap-northeast-2"
          fi
          
          echo "Project Region: $REGION"
          
          # 2. IPv4를 지원하는 AWS Pooler 호스트 생성
          # 이 호스트명은 대부분의 경우 IPv4 주소를 가지고 있습니다.
          DB_HOST="aws-0-${REGION}.pooler.supabase.com"
          DB_PASSWORD=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''${{ secrets.SUPABASE_DB_PASSWORD }}'''))")
          
          # 3. DB_URL 설정 (풀러용 포트 6543 사용, 사용자명 형식 주의: postgres.[project-id])
          DB_URL="postgresql://postgres.${{ secrets.SUPABASE_PROJECT_ID }}:${DB_PASSWORD}@${DB_HOST}:6543/postgres?sslmode=require"
          
          echo "Connecting to Supabase IPv4 Pooler: $DB_HOST"
          
          # 4. 마이그레이션 푸시
          supabase db push --db-url "$DB_URL"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
